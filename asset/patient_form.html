<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Patient</title>

    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

    <div class="mobile-menu-btn" onclick="toggleSidebar()">
        ☰
    </div>

    <div class="wrapper">

        <!-- Sidebar -->

        <aside class="sidebar" id="sidebar">

            <div class="logo">

                <h2>MediCore</h2>

                <span>Hospital ERP</span>

            </div>

            <ul>

                <li>
                    <a href="dashboard.html">Dashboard</a>
                </li>

                <li class="active">
                    <a href="patient_list.html">Patients</a>
                </li>

                <li>
                    <a href="doctor_list.html">Doctors</a>
                </li>

                <li>
                    <a href="employee_list.html">Employees</a>
                </li>

                <li>
                    <a href="appointment_list.html">Appointments</a>
                </li>

            </ul>

        </aside>

        <main class="main">

            <div class="page-header">

                <div>

                    <h1>Add New Patient</h1>

                    <p>Register a new patient into the hospital management system.</p>

                </div>

                <a href="patient_list.html" class="btn-primary">
                    ← Back to Patients
                </a>

            </div>

            <div class="form-card">

                <h2>Patient Information</h2>

                <form>

                    <div class="form-grid">

                        <div class="form-group">

                            <label>Patient Full Name</label>

                            <input type="text" placeholder="Enter full name">

                        </div>

                        <div class="form-group">

                            <label>Patient ID</label>

                            <input type="text" placeholder="PT001">

                        </div>

                        <div class="form-group">

                            <label>Mobile Number</label>

                            <input type="tel" placeholder="+8801XXXXXXXXX">

                        </div>

                        <div class="form-group">

                            <label>Email Address</label>

                            <input type="email" placeholder="patient@email.com">

                        </div>

                        <div class="form-group">

                            <label>Date of Birth</label>

                            <input type="date">

                        </div>

                        <div class="form-group">

                            <label>Gender</label>

                            <select>

                                <option>Select Gender</option>

                                <option>Male</option>

                                <option>Female</option>

                                <option>Other</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Blood Group</label>

                            <select>

                                <option>Select Blood Group</option>

                                <option>A+</option>
                                <option>A-</option>
                                <option>B+</option>
                                <option>B-</option>
                                <option>AB+</option>
                                <option>AB-</option>
                                <option>O+</option>
                                <option>O-</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Department</label>

                            <select>

                                <option>Select Department</option>

                                <option>Cardiology</option>

                                <option>Neurology</option>

                                <option>Orthopedic</option>

                                <option>Medicine</option>

                                <option>Pediatrics</option>

                                <option>Emergency</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Emergency Contact</label>

                            <input type="text" placeholder="+8801XXXXXXXXX">

                        </div>

                        <div class="form-group">

                            <label>National ID</label>

                            <input type="text" placeholder="NID Number">

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Address</label>

                        <textarea rows="4" placeholder="Full Address"></textarea>

                    </div>

                    <div class="form-group">

                        <label>Medical History</label>

                        <textarea rows="5" placeholder="Previous disease, allergies, operations etc."></textarea>

                    </div>

                    <div class="form-group">

                        <label>Patient Photo</label>

                        <input type="file">
                    </div>

                    <div class="form-buttons">

                        <button class="btn-primary">
                            Save Patient
                        </button>

                        <a href="patient_list.html" class="btn-cancel">
                            Cancel
                        </a>

                    </div>

                </form>

            </div>

        </main>

    </div>

    <script>

        function toggleSidebar() {

            document.getElementById("sidebar").classList.toggle("show");

        }

    </script>

</body>

</html>
