<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Employee</title>

    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

    <div class="mobile-menu-btn" onclick="toggleSidebar()">☰</div>

    <div class="wrapper">

        <!-- Sidebar -->

        <aside class="sidebar" id="sidebar">

            <div class="logo">

                <h2>MediCore</h2>

                <span>Hospital ERP</span>

            </div>

            <ul>

                <li><a href="dashboard.html">Dashboard</a></li>

                <li><a href="patient_list.html">Patients</a></li>

                <li><a href="doctor_list.html">Doctors</a></li>

                <li class="active"><a href="employee_list.html">Employees</a></li>

                <li><a href="appointment_list.html">Appointments</a></li>

            </ul>

        </aside>

        <!-- Main -->

        <main class="main">

            <div class="page-header">

                <div>

                    <h1>Add Employee</h1>

                    <p>Create a new employee profile</p>

                </div>

                <a href="employee_list.html" class="btn-primary">

                    ← Back

                </a>

            </div>

            <div class="form-card">

                <form>

                    <div class="doctor-form-layout">

                        <!-- Left -->

                        <div class="doctor-photo-card">

                            <div class="doctor-photo">

                                👤

                            </div>

                            <h3>Employee Photo</h3>

                            <input type="file">

                        </div>

                        <!-- Right -->

                        <div>

                            <div class="form-grid">

                                <div class="form-group">

                                    <label>Employee Name</label>

                                    <input type="text">

                                </div>

                                <div class="form-group">

                                    <label>Email</label>

                                    <input type="email">

                                </div>

                                <div class="form-group">

                                    <label>Phone Number</label>

                                    <input type="text">

                                </div>

                                <div class="form-group">

                                    <label>Employee ID</label>

                                    <input type="text">

                                </div>

                                <div class="form-group">

                                    <label>Department</label>

                                    <select>

                                        <option>Reception</option>

                                        <option>Laboratory</option>

                                        <option>Accounts</option>

                                        <option>Pharmacy</option>

                                        <option>Security</option>

                                        <option>Cleaner</option>

                                        <option>IT Support</option>

                                    </select>

                                </div>

                                <div class="form-group">

                                    <label>Position</label>

                                    <input type="text">

                                </div>

                                <div class="form-group">

                                    <label>Salary</label>

                                    <input type="number">

                                </div>

                                <div class="form-group">

                                    <label>Joining Date</label>

                                    <input type="date">

                                </div>

                                <div class="form-group">

                                    <label>Gender</label>

                                    <select>

                                        <option>Male</option>

                                        <option>Female</option>

                                        <option>Other</option>

                                    </select>

                                </div>

                                <div class="form-group">

                                    <label>Date of Birth</label>

                                    <input type="date">

                                </div>

                            </div>

                            <div class="form-group">

                                <label>Address</label>

                                <textarea rows="5"></textarea>

                            </div>

                            <div class="form-buttons">

                                <button class="btn-primary">

                                    Save Employee

                                </button>

                                <a href="employee_list.html" class="btn-cancel">

                                    Cancel

                                </a>

                            </div>

                        </div>

                    </div>

                </form>

            </div>

        </main>

    </div>

    <script>

        function toggleSidebar() {

            document.getElementById("sidebar").classList.toggle("show");

        }

    </script>

</body>

</html>
