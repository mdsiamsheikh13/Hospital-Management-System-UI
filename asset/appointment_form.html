<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Appointment</title>

    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body>

    <div class="mobile-menu-btn" onclick="toggleSidebar()">☰</div>

    <div class="wrapper">

        <!-- Sidebar -->

        <aside class="sidebar" id="sidebar">

            <div class="logo">

                <h2>MediCore</h2>

                <span>Hospital ERP</span>

            </div>

            <ul>

                <li><a href="dashboard.html">Dashboard</a></li>

                <li><a href="patient_list.html">Patients</a></li>

                <li><a href="doctor_list.html">Doctors</a></li>

                <li><a href="employee_list.html">Employees</a></li>

                <li class="active"><a href="appointment_list.html">Appointments</a></li>

            </ul>

        </aside>

        <!-- Main -->

        <main class="main">

            <div class="page-header">

                <div>

                    <h1>New Appointment</h1>

                    <p>Create patient appointment</p>

                </div>

                <a href="appointment_list.html" class="btn-primary">

                    ← Back

                </a>

            </div>

            <div class="form-card">

                <form>

                    <div class="form-grid">

                        <div class="form-group">

                            <label>Appointment ID</label>

                            <input type="text" placeholder="AP001">

                        </div>

                        <div class="form-group">

                            <label>Patient Name</label>

                            <select>

                                <option>Select Patient</option>

                                <option>Ahmed Khan</option>

                                <option>Sarah Ahmed</option>

                                <option>Rakib Hasan</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Doctor</label>

                            <select>

                                <option>Select Doctor</option>

                                <option>Dr. Ahmed Khan</option>

                                <option>Dr. Sarah Ahmed</option>

                                <option>Dr. Rakib Hasan</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Department</label>

                            <select>

                                <option>Cardiology</option>

                                <option>Neurology</option>

                                <option>Orthopedic</option>

                                <option>Emergency</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Appointment Date</label>

                            <input type="date">

                        </div>

                        <div class="form-group">

                            <label>Appointment Time</label>

                            <input type="time">

                        </div>

                        <div class="form-group">

                            <label>Appointment Type</label>

                            <select>

                                <option>Regular Checkup</option>

                                <option>Emergency</option>

                                <option>Follow Up</option>

                                <option>Consultation</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Status</label>

                            <select>

                                <option>Scheduled</option>

                                <option>Completed</option>

                                <option>Cancelled</option>

                            </select>

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Symptoms / Notes</label>

                        <textarea rows="5" placeholder="Write patient symptoms..."></textarea>

                    </div>

                    <div class="form-buttons">

                        <button class="btn-primary">

                            Save Appointment

                        </button>

                        <a href="appointment_list.html" class="btn-cancel">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </main>

    </div>

    <script>

        function toggleSidebar() {

            document.getElementById("sidebar").classList.toggle("show");

        }

    </script>

</body>

</html>
