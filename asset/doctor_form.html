{% extends 'base/base.html' %}
{% block content %}
<div class="table-container" style="max-width: 600px; padding: 2rem; margin: 0 auto; background: white;">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label style="font-weight: 600; margin-bottom: 0.25rem; display: block;">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<small style="color: var(--danger);">{{ field.errors.0 }}</small>{% endif %}
            </div>
        {% endfor %}
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <a href="{% url 'patient_list' %}" class="btn btn-edit">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
