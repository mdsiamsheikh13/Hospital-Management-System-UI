<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet" href="../static/css/style.css">

</head>

<body class="login-body">

    <div class="login-wrapper">

        <div class="login-left">

            <div class="overlay">

                <h1>MediCore</h1>

                <p>Create your Hospital Management Account</p>

                <div class="login-features">

                    <div>✔ Secure Dashboard</div>

                    <div>✔ Manage Patients</div>

                    <div>✔ Manage Doctors</div>

                    <div>✔ Manage Appointments</div>

                </div>

            </div>

        </div>

        <div class="login-right">

            <div class="login-card">

                <h2>Create Account</h2>

                <p>Fill in the information below.</p>

                <form>

                    <div class="form-group">

                        <label>Full Name</label>

                        <input type="text" placeholder="Enter Full Name">

                    </div>

                    <div class="form-group">

                        <label>Email Address</label>

                        <input type="email" placeholder="Enter Email">

                    </div>

                    <div class="form-group">

                        <label>Phone Number</label>

                        <input type="text" placeholder="+8801XXXXXXXXX">

                    </div>

                    <div class="form-group">

                        <label>Password</label>

                        <input type="password" placeholder="********">

                    </div>

                    <div class="form-group">

                        <label>Confirm Password</label>

                        <input type="password" placeholder="********">

                    </div>

                    <button class="login-btn">

                        Create Account

                    </button>

                    <div class="login-footer">

                        Already have an account?

                        <a href="../asset/auth.html">

                            Login

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</body>

</html>
